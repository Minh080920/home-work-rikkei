<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <section>
        <h1>Hồ Sơ Thông Tin Cá Nhân</h1>
        <form>
            <fieldset>
            <legend>Thông tin cá nhân</legend>

            <label for="name">Tên: </label>
            <input type="text" id="name" name="name" placeholder="Nhập họ và tên"><br><br>

            <label for="birthday"> Ngày sinh:  </label>
            <input type="date" id="birthday" name="birthday">
        </fieldset>
    <br>
        <fieldset>
            <legend>Thông tin liên hệ</legend>

            <label for="email">Email: </label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com"><br><br>

            <label for="tel">Số điện thoại</label>
            <input type="tel" id="tel" name="tel" placeholder="0912345678">
        </fieldset>
    <br> 
        <label for="notes">ghi chú:</label><br>
        <textarea id="notes" name="notes" placeholder="Ghi chứ ở đây"></textarea><br>

     <br>
        <input type="submit" value="Lưu hồ sơ">
        </form>
    </section>
 
</body>
</html>
