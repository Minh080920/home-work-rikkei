<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <h1>Khảo sát dịch vụ khách hàng</h1>
        <form>
            <label for="age">Nhập độ tuổi của bạn: </label>
            <input type="number" id="age" name="age"><br>

       <br> 
        <fieldset>
            <legend>Giới tính của bạn là gì ?</legend>
            <label for="gender"></label>
            <input type="radio" id="gender" name="gender" value="man">Nam
            <input type="radio" id="gender" name="gender" value="women">Nữ
            <input type="radio" id="gender" name="gender" value="other">Khác
       </fieldset> 
    <br>

    <fieldset>
            <legend>Dịch vụ bạn đang quan tâm ( có thể chọn nhiều )</legend>
            <label for="subject"></label>
            <input type="checkbox" id="subject" name="subject" value="website">website
            <input type="checkbox" id="subject" name="subject" value="mobileapp">Mobile App
            <input type="checkbox" id="subject" name="subject" value="marketing">Marketing
    </fieldset> 
    <br>
    
    <label for="country">Quốc gia đang sinh sống: </label>
    <select name="country" id="country">
        <option value="vietnamese">Việt Nam</option>
        <option value="japan">Nhật bản</option>
        <option value="usa">Mỹ</option>
    </select>

    <br>
    <input type="submit" value="Gửi Thông Tin">

        </form>
        
</section>
 
</body>
</html>
